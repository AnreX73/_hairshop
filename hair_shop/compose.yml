services:
  web:
    build: .  # Т.к. файл теперь в корне рядом с Dockerfile
    container_name: hair_shop_web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - .:/app  # Монтируем текущую папку в контейнер
    # environment из compose перекрывает значения из .env
    # Для сервера лучше убрать DEBUG=True отсюда и держать его только в .env
    environment:
      - DEBUG=True 
    networks:
      - web
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer
    container_name: hair_shop_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - web
    depends_on:
      db:
        condition: service_healthy

  db:
    # Внимание: на текущий момент стабильная версия Postgres — 17. 
    # Версии 18 еще нет в официальном Docker Hub (используйте 17 или 16).
    image: postgres:17-alpine 
    container_name: hair_shop_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    # Порт 5432 наружу лучше не открывать для безопасности VPS, 
    # контейнеры внутри сети 'web' и так его видят.
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  web:
    driver: bridge

volumes:
  postgres_data:
